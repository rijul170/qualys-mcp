name: Publish to MCP Registry

# Publishes server.json (io.github.rijul170/qualys-mcp) to the official MCP
# Registry using GitHub OIDC — the workflow's own identity authorizes the
# io.github.rijul170/* namespace, so no tokens or device codes are needed.
#
# The underlying PyPI package (qualys-mcp-full) is published separately; this
# workflow only registers the server metadata. Run it manually from the Actions
# tab ("Run workflow"), or automatically by pushing a version tag (v*).

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
